services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: leadflow-evolution-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - leadflow-evolution

  postgres:
    image: postgres:16-alpine
    container_name: leadflow-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
      POSTGRES_USER: ${POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evolution} -d ${POSTGRES_DB:-evolution}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - leadflow-evolution

  redis:
    image: redis:7-alpine
    container_name: leadflow-evolution-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - evolution_redis:/data
    networks:
      - leadflow-evolution

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:

networks:
  leadflow-evolution:
    name: leadflow-evolution
